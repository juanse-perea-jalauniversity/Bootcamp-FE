<body class="body" [class.sidebar-collapsed]="isCollapsed()">
  <header>
    <h1>
      {{ title |
      slice:0:(isShowingMore() ? title.length : 50) }}{{isShowingMore() ? "" : "..."}}
    </h1>
    <button (click)="toggleShowMore()">Show {{isShowingMore() ? "less" : "more"}}</button>
    <p>{{paginationItems() | slice:currentPage():currentPage() + sizePage()}}</p>
    <button (click)="previousPage()">Previous page</button>
    <button (click)="nextPage()">Next page</button>
  </header>
  <div class="sidebar">
    <button (click)="collapse()">Collapse</button>
  </div>
  <main>
    <div class="light-purple-bar"></div>
    <div class="purple-bar"></div>
    <div class="boxes-container">
      <div class="box1"></div>
      <div class="box2"></div>
      <div class="box3"></div>
      <div class="box4"></div>
    </div>
  </main>
</body>
