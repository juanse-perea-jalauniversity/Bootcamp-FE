<main>
  <h1>{{ title() }}</h1>

  <div class="switch-buttons">
      <button (click)="switchToCarbonara()">
    View Carbonara
    @if (recipes[0].isFavorite) { <span>★</span> }
  </button>
  <button (click)="switchToSalad()">
    View Salad
    @if (recipes[1].isFavorite) { <span>★</span> }
  </button>
  </div>
  <br>

  <app-recipe-detail [recipe]="recipe()" />

</main>
