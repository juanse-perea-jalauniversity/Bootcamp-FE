<main>
  <h1>{{ title() }}</h1>

  <h1>{{ recipe().name }}</h1>
  <p>{{ recipe().description }}</p>

</main>

<button (click)="switchToCarbonara()">View carbonara</button>
<button (click)="switchToSalad()">View salad</button>
<ul>
  @for (ing of recipe().ingredients; track ing.name) {
  <li>{{ ing.quantity }} {{ ing.unit }} of {{ ing.name }}</li>
  }
</ul>

<button (click)="doubleIngredients()">Double Ingredients Portion</button>
<p><strong>Total amount of ingredients needed: </strong>{{ totalIngredientsQuantity() }}</p>

<router-outlet />
