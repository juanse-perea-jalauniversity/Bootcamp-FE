<div class="card-grid">
  @for (card of cards(); track card.id) {
    <card-slot [cardInfo]="card"></card-slot>
  } @empty {
    <p>Loading...</p>
  }
</div>

@if (allCards().length > 0) {
  <pagination
    [currentPage]="currentPage()"
    [totalPages]="totalPages()"
    (pageChange)="onPageChange($event)"
  />
}
