<div class="pagination">
  <button type="button" (click)="previous()" [disabled]="currentPage() === 1">
    ← Previous
  </button>

  <span class="pagination-status">Page {{ currentPage() }} of {{ totalPages() }}</span>

  <button type="button" (click)="next()" [disabled]="currentPage() === totalPages()">
    Next →
  </button>
</div>
