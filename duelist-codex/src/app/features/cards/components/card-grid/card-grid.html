<div class="card-grid">
  @if (loading()) {
    <p>Loading...</p>
  } @else if (cards().length === 0) {
    <p>No cards found.</p>
  } @else {
    @for (card of cards(); track card.id) {
      <card-slot [cardInfo]="card" (cardClick)="onCardClick($event)"></card-slot>
    }
  }
</div>

@if (totalPages() > 1) {
  <pagination
    [currentPage]="currentPage()"
    [totalPages]="totalPages()"
    (pageChange)="onPageChange($event)"
  />
}
